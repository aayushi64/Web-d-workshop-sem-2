<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>DIFFERENT TYPES OF PATTERNS USING JAVASCRIPT</h2>
    <script>
        let rows = 5;

        //SIMPLE PYRAMID
        for(let i=1; i<=rows; i++)
        console.log("* ".repeat(i));
        
        //FLIPPED SIMPLE PYRAMID
        for(let i=1; i<=rows; i++){
        console.log("  ".repeat(rows-i)+"* ".repeat(i));
        }

        // INVERTED PYRAMID
        for(let i=rows; i>=1; i--)
        console.log("* ".repeat(i));

        //FLIPPED INVERTED PYRAMID
        for(let i=rows; i>=1; i--){
        console.log("  ".repeat(rows-i)+"* ".repeat(i));
        }

        //TRIANGLE
        for(let i=1; i<=rows; i++){
        console.log("\xa0".repeat(rows-i)+ "* ".repeat(i));
        }


        //INVERTED TRIANGLE
         for(let i=rows; i>=1; i--){
        console.log("\xa0".repeat(rows-i)+ "* ".repeat(i));
        }

    </script>
</body>
</html>

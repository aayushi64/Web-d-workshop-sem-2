<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Page</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="container">
        <h2 id="mainheading"> Welcome to Javascript</h2>
        <BR>
            <input type="text" id="input1" placeholder="Enter new heading">
            <button id="newHeading">Change Heading</button>
            <button id="changeFont">Increase Font size</button>
            <button id="newbackground">Change Background</button>
            <button id="togglebtn">Show/Hide Paragraph</button>
            <button id="reset">reset</button>
            <p id="paragraph">This is a sample paragraph. Javascript events can dynamically change container.</p> 
    </div>
    <script src="main.jsx"></script>
</body>
</html>

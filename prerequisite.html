<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Arena</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
    <video autoplay loop muted plays-inline class="background-video">
        <source src="chess.mp4" type="video/mp4">
    </video>

    <header>
        <div class="user-icon">
            <i class="fas fa-user-circle"></i>
        </div>
        <div class="settings-icon">
            <i class="fas fa-cog"></i>
        </div>
    </header>

    <main>
        <div class="options-container">
            <div class="option play">
                Play
                <div class="submenu">
                    <div class="suboption">Online Play</div>
                    <div class="suboption">Online Friends Play</div>
                </div>
            </div>
            <div class="option">Practice</div>
            <div class="option">vs Computer</div>
            <div class="option">Offline</div>
        </div>
    </main>
    <div>

</body>
</html>
